{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-white">
        <h4>Listar alunos</h4>
    </div>

    <div class="card-body">

        <form action="/importar" method="post" enctype="multipart/form-data" class="mb-3">
            <input type="file" name="arquivo">
            <button class="btn btn-success">Importar Excel</button>
        </form>

        <form method="get" class="row mb-4">

            <div class="col-md-3">
                <input class="form-control" name="busca" placeholder="Buscar nome">
            </div>

            <div class="col-md-3">
                <input class="form-control" name="escola" placeholder="Filtrar escola">
            </div>

            <div class="col-md-3">
                <input class="form-control" name="pais" placeholder="Filtrar país">
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary">Filtrar</button>
            </div>

        </form>

        <table class="table table-striped table-bordered">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Escola</th>
                <th>País</th>
                <th>Ver detalhes</th>
            </tr>

            {% for aluno in alunos %}
            <tr>
                <td>{{ aluno[0] }}</td>
                <td>{{ aluno[1] }}</td>
                <td>{{ aluno[3] }}</td>
                <td>{{ aluno[4] }}</td>
                <td>
                    <a href="/detalhes/{{ aluno[0] }}" class="btn btn-info btn-sm">Ver</a>
                </td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>

{% endblock %}
