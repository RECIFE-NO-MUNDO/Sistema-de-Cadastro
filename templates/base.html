<!DOCTYPE html>
<html>
<style>
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('/static/logo.png') center no-repeat;
        background-size: 450px;
        opacity: 0.08;
        z-index: -1;
    }
</style>

<head>
    <title>Sistema de Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
background:#f4f6f9;
background-image:url('/static/logo.png');
background-repeat:no-repeat;
background-position:center;
background-size:500px;
background-attachment:fixed;
">

    <div class="d-flex">

        <div style="width:250px; min-height:100vh; background:#1f2d3d; color:white; padding:20px;">
            <h4>Gestão Alunos</h4>
            <hr>

            <a href="/" class="btn btn-dark w-100 mb-2">Tela inicial</a>
            <a href="/novo" class="btn btn-success w-100 mb-2">Adicionar aluno</a>
            <a href="/excel" class="btn btn-primary w-100 mb-2">Exportar Excel</a>
            <a href="/pdf" class="btn btn-danger w-100 mb-2">Exportar PDF</a>
        </div>

        <div class="container-fluid p-4">
            {% block content %}{% endblock %}
        </div>

    </div>

</body>

</html>
